<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RC-display — Admin v1 · In-situ Editor</title>
<style>
/* ─── Fonts (offline) ────────────────────────────────────────── */
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geist-0.woff2) format('woff2');
  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geist-1.woff2) format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geist-2.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: swap;
  src: url(./fonts/geist-3.woff2) format('woff2');
  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: swap;
  src: url(./fonts/geist-4.woff2) format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
@font-face { font-family: 'Geist'; font-style: normal; font-weight: 500; font-display: swap;
  src: url(./fonts/geist-5.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geistmono-1.woff2) format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geistmono-2.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/notosans-0.woff2) format('woff2'); }
@font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 500; font-display: swap;
  src: url(./fonts/notosans-1.woff2) format('woff2'); }

:root {
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1A1A1A;
  --border: #262626; --border-hi: #404040;
  --text: #EDEDED; --muted: #8F8F8F; --dim: #5A5A5A;
  --danger: #EF4444; --ease: cubic-bezier(0.22, 0.9, 0.3, 1);
  --font-sans: 'Geist', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', Menlo, monospace;
  --font-cn:   'Noto Sans SC', 'PingFang SC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; background: #080808; font-family: var(--font-sans); color: var(--text); -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }

/* Admin top bar */
.admin-bar {
  width: 1080px; display: flex; align-items: center; gap: 14px;
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
  color: var(--muted); text-transform: uppercase;
}
.admin-bar .badge { padding: 4px 8px; border: 1px solid var(--border-hi); color: var(--text); }
.admin-bar .dirty { display: flex; align-items: center; gap: 6px; }
.admin-bar .dirty .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 200ms var(--ease); }
.admin-bar .dirty.is-dirty .dot { background: var(--danger); }
.admin-bar .dirty.is-dirty .text { color: var(--text); }
.admin-bar .spacer { flex: 1; }
.admin-bar button {
  background: transparent; border: 1px solid var(--border-hi); color: var(--text);
  padding: 6px 12px; cursor: pointer; font: inherit; letter-spacing: 0.06em;
  text-transform: uppercase; transition: all 150ms var(--ease);
}
.admin-bar button:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.admin-bar button.danger { color: var(--muted); }
.admin-bar button.danger:hover { background: var(--danger); color: var(--bg); border-color: var(--danger); }

.admin-frame-wrap { width: 1080px; transform-origin: top center; }
.admin-frame {
  width: 1080px; height: 960px; background: var(--bg);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 56px 56px 40px; gap: 36px;
}

/* Header: tabs + lang toggle */
.header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; border-bottom: 1px solid var(--border); }
.tabs-wrap { flex: 1; display: flex; align-items: stretch; gap: 12px; min-width: 0; }
.tabs {
  flex: 1; display: flex; gap: 36px; align-items: flex-end;
  overflow-x: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
          mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; position: relative; padding: 18px 0; min-height: 48px; cursor: pointer;
  color: var(--muted); transition: color 180ms var(--ease); user-select: text;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); }
.tab.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 1px; background: var(--text);
}
.tab-title { font-size: 28px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.1; white-space: nowrap; color: inherit; display: inline-block; }

.add-tab {
  flex-shrink: 0; align-self: center;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 1px dashed var(--border); color: var(--dim);
  font-size: 22px; font-weight: 300; cursor: pointer; background: transparent;
  transition: all 180ms var(--ease);
}
.add-tab:hover { color: var(--text); border-color: var(--text); }

.lang-toggle {
  flex-shrink: 0; display: flex; align-items: baseline; gap: 10px;
  padding: 18px 0; min-height: 48px; cursor: pointer;
  font-family: var(--font-sans); font-size: 28px; font-weight: 500;
  color: var(--muted); letter-spacing: -0.015em; line-height: 1.1;
  transition: color 180ms var(--ease); user-select: none;
}
.lang-toggle:hover { color: var(--text); }
.lang-toggle .on  { color: var(--text); }
.lang-toggle .off { color: var(--dim); }
.lang-toggle .sep { color: var(--dim); font-weight: 400; }

/* Main 3-column */
.main { flex: 1; display: grid; grid-template-columns: 128px 1fr 128px; gap: 36px; min-height: 0; }

.avatars, .thumbs {
  display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 30px), transparent 100%);
          mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 30px), transparent 100%);
  padding-top: 2px; padding-right: 2px;
}
.avatars::-webkit-scrollbar, .thumbs::-webkit-scrollbar { display: none; }

.avatar {
  flex-shrink: 0; width: 104px; height: 104px; border-radius: 50%; position: relative;
  background-color: var(--surface); background-size: cover; background-position: center;
  border: 1px solid var(--border); cursor: pointer; filter: saturate(0.85);
  transition: border-color 200ms var(--ease);
}
.avatar.empty { border-style: dashed; }
.avatar:hover { border-color: var(--border-hi); }
.avatar.active { border-color: var(--text); filter: saturate(1); }
.avatar.active::after {
  content: ""; position: absolute; inset: -5px; border-radius: 50%;
  border: 1px solid var(--text); pointer-events: none;
}
.avatar.empty::before {
  content: "+"; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 28px; font-weight: 300;
}

.avatar-with-label { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.avatar-original-label {
  font-family: var(--font-mono); font-size: 9px; color: var(--dim);
  letter-spacing: 0.18em; text-transform: uppercase; text-align: center;
  user-select: none; white-space: nowrap;
}

.add-item {
  flex-shrink: 0; width: 104px; height: 104px;
  border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 28px; font-weight: 300;
  cursor: pointer; background: transparent;
  transition: all 180ms var(--ease);
}
.add-avatar { border-radius: 50%; }
.add-item:hover { border-color: var(--text); color: var(--text); }

/* Center */
.center { display: flex; flex-direction: column; gap: 20px; min-width: 0; min-height: 0; }
.name { display: flex; align-items: baseline; gap: 16px; min-height: 56px; flex-wrap: wrap; }
.name-primary {
  font-size: 46px; font-weight: 500; letter-spacing: -0.02em; line-height: 1;
  color: var(--text); min-width: 4ch;
}
.name-primary.is-zh { font-family: var(--font-cn); font-weight: 500; letter-spacing: 0; }
.name-secondary {
  font-family: var(--font-mono); font-size: 14px; font-weight: 400;
  color: var(--muted); letter-spacing: 0.04em; min-width: 4ch;
}
.name-secondary.is-zh { font-family: var(--font-cn); font-size: 18px; letter-spacing: 0; }

/* Meta row — shown only when the default artifact entry is selected */
.meta-row {
  display: none;
  flex-wrap: wrap; gap: 14px 28px;
  padding: 10px 0 12px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.meta-row.visible { display: flex; }
.meta-field { display: inline-flex; align-items: baseline; gap: 8px; position: relative; }
.meta-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--dim);
  letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap;
}
.meta-value {
  font-family: var(--font-sans); font-size: 14px; font-weight: 400;
  color: var(--text); letter-spacing: -0.005em; min-width: 3ch;
}
.meta-value.is-zh { font-family: var(--font-cn); font-size: 15px; letter-spacing: 0; }
.meta-field .edit-icon { padding: 2px; }
.meta-field:hover .edit-icon { opacity: 1; pointer-events: auto; }

.media { flex: 1; min-height: 0; position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
.media-inner {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 1; transition: opacity 220ms var(--ease);
}
.media-inner.fading { opacity: 0; }
.media-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.media-3d {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  background: var(--surface);
}
.media-3d .glyph { font-size: 84px; font-weight: 500; letter-spacing: -0.04em; color: var(--text); line-height: 1; }
.media-3d .label { font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.media-empty { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--dim); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
.media-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(10,10,10,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(237,237,237,0.25);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 2;
}
.media-play::before { content: ""; width: 0; height: 0; border-left: 16px solid var(--text); border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }

.media-upload {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  background: rgba(10,10,10,0.7); backdrop-filter: blur(6px);
  opacity: 0; cursor: pointer; pointer-events: none;
  transition: opacity 220ms var(--ease);
}
.media:hover .media-upload { opacity: 1; pointer-events: auto; }
.media-upload .plus {
  width: 72px; height: 72px; border-radius: 50%; border: 1px solid var(--text);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: var(--text); font-weight: 300;
}
.media-upload .label { font-family: var(--font-mono); font-size: 11px; color: var(--text); letter-spacing: 0.12em; text-transform: uppercase; }

.description { min-height: 110px; max-height: 150px; overflow-y: auto; scrollbar-width: thin; position: relative; }
.description-body { font-size: 17px; font-weight: 400; line-height: 1.55; color: var(--text); letter-spacing: -0.005em; min-height: 1.5em; }
.description-body.is-zh { font-family: var(--font-cn); font-size: 18px; line-height: 1.75; letter-spacing: 0; }

/* Right thumbs */
.thumb { flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; cursor: pointer; position: relative; }
.thumb-tile { width: 104px; height: 104px; position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); transition: border-color 200ms var(--ease); }
.thumb:hover .thumb-tile { border-color: var(--border-hi); }
.thumb.active .thumb-tile { border-color: var(--text); }
.thumb-tile img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.85); transition: filter 200ms var(--ease); }
.thumb:hover .thumb-tile img, .thumb.active .thumb-tile img { filter: saturate(1); }
.thumb-3d { display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 500; letter-spacing: -0.03em; color: var(--text); background: var(--surface-2); }
.thumb-video-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 0; height: 0;
  border-left: 12px solid var(--text); border-top: 7px solid transparent; border-bottom: 7px solid transparent;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
}
.thumb-label { font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--muted); letter-spacing: 0.06em; text-align: left; }
.thumb.active .thumb-label { color: var(--text); }

/* Editable (edit mode only via pencil trigger) */
[contenteditable="true"] {
  outline: none; border-bottom: 1px dashed var(--text);
  background: var(--surface-2);
  padding: 1px 4px; margin: -1px -4px; border-radius: 2px; min-width: 4ch;
}
[data-placeholder]:not([contenteditable="true"]):empty::before {
  content: attr(data-placeholder);
  color: var(--dim); opacity: 0.55; font-weight: 400; letter-spacing: 0;
  pointer-events: none;
}
.description-body { min-height: 1.55em; }

.edit-icon {
  background: transparent; border: none; padding: 4px; cursor: pointer;
  color: var(--dim); display: inline-flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; border-radius: 2px;
  transition: color 150ms var(--ease), opacity 150ms var(--ease), background 150ms var(--ease);
  vertical-align: baseline;
}
.edit-icon:hover { color: var(--text); background: var(--surface-2); }
.tab:hover .edit-icon,
.name:hover .edit-icon,
.description:hover .edit-icon { opacity: 1; pointer-events: auto; }
.description { position: relative; }
.description .edit-icon { position: absolute; top: 0; right: 0; }

.avatar-edit {
  position: absolute; right: -2px; bottom: -2px; z-index: 3;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border-hi);
  color: var(--muted); cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: all 150ms var(--ease);
}
.avatar:hover .avatar-edit { opacity: 1; pointer-events: auto; }
.avatar-edit:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

.remove-btn {
  position: absolute; top: -7px; right: -7px; z-index: 6;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border-hi);
  color: var(--muted); cursor: pointer; padding: 0;
  font-family: var(--font-mono); font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: all 150ms var(--ease);
}
.tab:hover .remove-btn,
.avatar:hover .remove-btn,
.thumb:hover .remove-btn { opacity: 1; pointer-events: auto; }
.avatar.avatar-original .remove-btn { display: none; }
.remove-btn:hover { background: var(--danger); border-color: var(--danger); color: var(--bg); }
.tab .remove-btn { top: 10px; right: -6px; }

.dragging { opacity: 0.25; }
.drop-target-before { box-shadow: -3px 0 0 0 var(--text); }
.drop-target-after  { box-shadow:  3px 0 0 0 var(--text); }
.drop-target-above  { box-shadow: 0 -3px 0 0 var(--text); }
.drop-target-below  { box-shadow: 0  3px 0 0 var(--text); }

@media (hover: none) {
  .media-upload { opacity: 1 !important; pointer-events: auto !important; }
  .remove-btn, .edit-icon, .avatar-edit { opacity: 0.6 !important; pointer-events: auto !important; }
  .avatar.avatar-original .remove-btn { display: none !important; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="admin-bar">
  <span class="badge">ADMIN v1</span>
  <span class="dirty" id="dirtyBadge"><span class="dot"></span><span class="text">clean · no unsaved changes</span></span>
  <span class="spacer"></span>
  <button id="btnSave">save → console</button>
  <button id="btnExport">export json</button>
  <button id="btnReset" class="danger">reset mock</button>
</div>

<div class="admin-frame-wrap" id="wrap">
  <div class="admin-frame">
    <div class="header">
      <div class="tabs-wrap">
        <div class="tabs" id="tabs"></div>
        <button class="add-tab" id="btnAddArtifact" title="Add artifact">+</button>
      </div>
      <div class="lang-toggle" id="langToggle">
        <span class="on"  id="langOn">EN</span>
        <span class="sep">/</span>
        <span class="off" id="langOff">中</span>
      </div>
    </div>

    <div class="main">
      <div class="avatars" id="avatars"></div>

      <div class="center">
        <div class="name">
          <span class="name-primary"   id="namePrimary"   data-placeholder="name"></span>
          <button class="edit-icon" id="editPrimary" title="Edit name" aria-label="Edit name"></button>
          <span class="name-secondary" id="nameSecondary" data-placeholder="· translation"></span>
          <button class="edit-icon" id="editSecondary" title="Edit translation" aria-label="Edit translation"></button>
        </div>

        <div class="meta-row" id="metaRow">
          <div class="meta-field">
            <span class="meta-label" id="creatorLabel">CREATOR</span>
            <span class="meta-value" id="metaCreator" data-placeholder="—"></span>
            <button class="edit-icon" id="editCreator" title="Edit creator" aria-label="Edit creator"></button>
          </div>
          <div class="meta-field">
            <span class="meta-label" id="periodLabel">PERIOD</span>
            <span class="meta-value" id="metaPeriod" data-placeholder="—"></span>
            <button class="edit-icon" id="editPeriod" title="Edit period" aria-label="Edit period"></button>
          </div>
          <div class="meta-field">
            <span class="meta-label" id="ownerLabel">OWNER</span>
            <span class="meta-value" id="metaOwner" data-placeholder="—"></span>
            <button class="edit-icon" id="editOwner" title="Edit owner" aria-label="Edit owner"></button>
          </div>
          <div class="meta-field">
            <span class="meta-label" id="dimensionsLabel">DIMENSIONS</span>
            <span class="meta-value" id="metaDimensions" data-placeholder="—"></span>
            <button class="edit-icon" id="editDimensions" title="Edit dimensions" aria-label="Edit dimensions"></button>
          </div>
          <div class="meta-field">
            <span class="meta-label" id="discoveryLabel">DISCOVERY</span>
            <span class="meta-value" id="metaDiscovery" data-placeholder="—"></span>
            <button class="edit-icon" id="editDiscovery" title="Edit discovery location" aria-label="Edit discovery location"></button>
          </div>
        </div>

        <div class="media" id="media">
          <div class="media-inner" id="mediaInner"></div>
          <div class="media-upload" id="mediaUpload">
            <div class="plus">+</div>
            <div class="label">replace media</div>
          </div>
        </div>

        <div class="description">

const THUMB_LABEL = {
  en: { '3d': '3D MODEL', 'video': 'VIDEO', 'image': 'IMAGE' },
  zh: { '3d': '三维模型', 'video': '视频', 'image': '图像' },
};
const META_LABELS = {
  en: { creator: 'CREATOR', period: 'PERIOD', owner: 'OWNER', dimensions: 'DIMENSIONS', discoveryLocation: 'DISCOVERY' },
  zh: { creator: '创作者',   period: '年代',   owner: '收藏',   dimensions: '尺寸',     discoveryLocation: '发现地' },
};
const ORIGINAL_LABEL = { en: 'ORIGINAL · 原作', zh: '原作 · ORIGINAL' };
const MEDIA_ORDER = { '3d': 0, 'video': 1, 'image': 2 };
const sortMedia = (c) => [...(c?.media ?? [])].sort((a, b) => MEDIA_ORDER[a.type] - MEDIA_ORDER[b.type]);
const uid = (prefix) => prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

let data = initialData();
const state = {
  lang: 'en',
  artifactId: data.artifacts[0]?.id ?? null,
  creationId: null,  // null = default artifact entry selected
  mediaIdx: 0,
  dirty: false,
};
const curArt = () => data.artifacts.find(a => a.id === state.artifactId) ?? null;
const curCre = () => state.creationId === null ? null : (curArt()?.creations.find(c => c.id === state.creationId) ?? null);
const isArtifactView = () => state.creationId === null;
const currentSource = () => isArtifactView() ? curArt() : curCre();
const currentDescGetter = () => {
  const a = curArt(), c = curCre();
  if (isArtifactView()) return a?.description ?? null;
  return c?.desc ?? null;
};

const $ = (id) => document.getElementById(id);
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style') e.style.cssText = props[k];
    else if (k === 'draggable') e.draggable = props[k];
    else if (k.startsWith('data-') || k.startsWith('aria-') || k === 'title' || k === 'src' || k === 'alt') e.setAttribute(k, props[k]);
    else e[k] = props[k];
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

// SVG icons via createElementNS (no innerHTML)
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgNode(attrs, children) {
  const n = document.createElementNS(SVG_NS, 'svg');
  for (const k in attrs) n.setAttribute(k, String(attrs[k]));
  children.forEach(c => n.appendChild(c));
  return n;
}
function svgPath(d) { const p = document.createElementNS(SVG_NS, 'path'); p.setAttribute('d', d); return p; }
function svgCircle(cx, cy, r) { const c = document.createElementNS(SVG_NS, 'circle'); c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r); return c; }
const SVG_COMMON = { fill: 'none', stroke: 'currentColor', 'stroke-width': 1.8, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' };
function pencilSvg() {
  return svgNode({ width: 14, height: 14, viewBox: '0 0 24 24', ...SVG_COMMON },
    [svgPath('M12 20h9'), svgPath('M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z')]);
}
function cameraSvg() {
  return svgNode({ width: 13, height: 13, viewBox: '0 0 24 24', ...SVG_COMMON },
    [svgPath('M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z'), svgCircle(12, 13, 4)]);
}

const dom = {
  tabs: $('tabs'), avatars: $('avatars'), thumbs: $('thumbs'),
  media: $('media'), mediaInner: $('mediaInner'), mediaUpload: $('mediaUpload'),
  namePrimary: $('namePrimary'), nameSecondary: $('nameSecondary'),
  editPrimary: $('editPrimary'), editSecondary: $('editSecondary'),
  description: $('description'), editDesc: $('editDesc'),
  langToggle: $('langToggle'), langOn: $('langOn'), langOff: $('langOff'),
  dirtyBadge: $('dirtyBadge'),
  fileIcon: $('fileIcon'), fileMedia: $('fileMedia'),
  metaRow: $('metaRow'),
  metaCreator: $('metaCreator'),     editCreator: $('editCreator'),         creatorLabel: $('creatorLabel'),
  metaPeriod:  $('metaPeriod'),      editPeriod:  $('editPeriod'),          periodLabel:  $('periodLabel'),
  metaOwner:   $('metaOwner'),       editOwner:   $('editOwner'),           ownerLabel:   $('ownerLabel'),
  metaDimensions: $('metaDimensions'), editDimensions: $('editDimensions'), dimensionsLabel: $('dimensionsLabel'),
  metaDiscovery:  $('metaDiscovery'),  editDiscovery:  $('editDiscovery'),  discoveryLabel:  $('discoveryLabel'),
  tabButtons: [], avatarButtons: [], thumbButtons: [],
};
// Install pencil/camera SVGs into their host buttons
[dom.editPrimary, dom.editSecondary, dom.editDesc, dom.editCreator, dom.editPeriod, dom.editOwner, dom.editDimensions, dom.editDiscovery].forEach(b => b.appendChild(pencilSvg()));

function markDirty() {
  if (state.dirty) return;
  state.dirty = true;
  dom.dirtyBadge.classList.add('is-dirty');
  dom.dirtyBadge.querySelector('.text').textContent = 'dirty · unsaved (session only)';
}
function markClean() {
  state.dirty = false;
  dom.dirtyBadge.classList.remove('is-dirty');
  dom.dirtyBadge.querySelector('.text').textContent = 'clean · no unsaved changes';
}

function makeEditable(textEl, triggerEl, getValue, setValue, multiline = false) {
  textEl.contentEditable = 'false';
  triggerEl.addEventListener('click', (e) => {
    e.stopPropagation();
    textEl.textContent = getValue() || '';
    textEl.contentEditable = 'true';
    textEl.focus();
    const range = document.createRange();
    range.selectNodeContents(textEl);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
  });
  textEl.addEventListener('blur', () => {
    if (textEl.contentEditable !== 'true') return;
    textEl.contentEditable = 'false';
    const v = textEl.textContent.trim();
    if (v !== (getValue() || '')) { setValue(v); markDirty(); }
    textEl.textContent = getValue() || '';
  });
  textEl.addEventListener('keydown', (e) => {
    if (textEl.contentEditable !== 'true') return;
    if (e.key === 'Enter' && !multiline) { e.preventDefault(); textEl.blur(); }
    else if (e.key === 'Escape') { textEl.blur(); }
  });
}

/* ── Builders (granular) ─────────────────────────────────────── */
function buildTabs() {
  clear(dom.tabs);
  data.artifacts.forEach(a => {
    const title = el('span', { class: 'tab-title', 'data-placeholder': state.lang === 'en' ? 'Artifact name' : '展品名称' });
    title.textContent = a.title[state.lang] || '';
    const editBtn = el('button', { class: 'edit-icon', title: 'Edit title', 'aria-label': 'Edit title' });
    editBtn.appendChild(pencilSvg());
    makeEditable(title, editBtn, () => a.title[state.lang], (v) => { a.title[state.lang] = v; });
    const removeBtn = el('button', { class: 'remove-btn', title: 'Remove artifact', 'aria-label': 'Remove' }, ['×']);
    removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeArtifact(a.id); });
    const tab = el('div', { class: 'tab' + (a.id === state.artifactId ? ' active' : ''), 'data-aid': a.id, draggable: true }, [title, editBtn, removeBtn]);
    tab.addEventListener('click', (e) => {
      if (e.target.closest('[contenteditable="true"]') || e.target.closest('.edit-icon') || e.target.closest('.remove-btn')) return;
      selectArtifact(a.id);
    });
    attachDrag(tab, 'artifact');
    dom.tabs.appendChild(tab);
  });
  dom.tabButtons = [...dom.tabs.querySelectorAll('.tab')];
}
function setActiveTab() {
  dom.tabButtons.forEach(b => b.classList.toggle('active', b.dataset.aid === state.artifactId));
}

function buildAvatars() {
  clear(dom.avatars);
  const artifact = curArt();
  if (artifact) {
    // Default artifact entry (first, non-removable, has label)
    const originalRing = el('div', {
      class: 'avatar avatar-original' + (isArtifactView() ? ' active' : '') + (!artifact.icon ? ' empty' : ''),
      'data-cid': '__artifact__',
    });
    if (artifact.icon) originalRing.style.backgroundImage = `url('${artifact.icon}')`;
    const originalEdit = el('button', { class: 'avatar-edit', title: 'Upload artifact icon', 'aria-label': 'Upload artifact icon' });
    originalEdit.appendChild(cameraSvg());
    originalEdit.addEventListener('click', (e) => { e.stopPropagation(); triggerArtifactIconUpload(); });
    originalRing.appendChild(originalEdit);
    originalRing.addEventListener('click', (e) => {
      if (e.target.closest('.avatar-edit')) return;
      selectArtifactEntry();
    });
    const originalLabel = el('div', { class: 'avatar-original-label' }, [ORIGINAL_LABEL[state.lang]]);
    const originalWrap = el('div', { class: 'avatar-with-label' }, [originalRing, originalLabel]);
    dom.avatars.appendChild(originalWrap);

    // Student creations
    artifact.creations.forEach(c => {
      const ring = el('div', {
        class: 'avatar' + (c.id === state.creationId ? ' active' : '') + (!c.icon ? ' empty' : ''),
        'data-cid': c.id, draggable: true,
      });
      if (c.icon) ring.style.backgroundImage = `url('${c.icon}')`;
      const editBtn = el('button', { class: 'avatar-edit', title: 'Upload icon', 'aria-label': 'Upload icon' });
      editBtn.appendChild(cameraSvg());
      editBtn.addEventListener('click', (e) => { e.stopPropagation(); triggerIconUpload(c.id); });
      const removeBtn = el('button', { class: 'remove-btn', title: 'Remove student', 'aria-label': 'Remove' }, ['×']);
      removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeCreation(c.id); });
      ring.appendChild(editBtn); ring.appendChild(removeBtn);
      ring.addEventListener('click', (e) => {
        if (e.target.closest('.avatar-edit') || e.target.closest('.remove-btn')) return;
        selectCreation(c.id);
      });
      attachDrag(ring, 'creation');
      dom.avatars.appendChild(ring);
    });
  }
  const addBtn = el('div', { class: 'add-item add-avatar', title: 'Add student' }, ['+']);
  addBtn.addEventListener('click', addCreation);
  dom.avatars.appendChild(addBtn);
  dom.avatarButtons = [...dom.avatars.querySelectorAll('.avatar')];
}
function setActiveAvatar() {
  dom.avatarButtons.forEach(b => {
    const cid = b.dataset.cid;
    const active = (cid === '__artifact__' && isArtifactView()) || (cid !== '__artifact__' && cid === state.creationId);
    b.classList.toggle('active', active);
  });
}

function buildThumbs() {
  clear(dom.thumbs);
  const source = currentSource();
  if (source) {
    const media = sortMedia(source);
    media.forEach((m, i) => {
      let tile;
      if (m.type === '3d') tile = el('div', { class: 'thumb-tile thumb-3d' }, ['3D']);
      else if (m.type === 'video') tile = el('div', { class: 'thumb-tile' }, [el('img', { src: m.src, alt: '' }), el('div', { class: 'thumb-video-badge' })]);
      else tile = el('div', { class: 'thumb-tile' }, [el('img', { src: m.src, alt: '' })]);
      const label = el('span', { class: 'thumb-label' }, [THUMB_LABEL[state.lang][m.type]]);
      const removeBtn = el('button', { class: 'remove-btn', title: 'Remove media', 'aria-label': 'Remove' }, ['×']);
      removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeMedia(i); });
      const thumb = el('div', { class: 'thumb' + (i === state.mediaIdx ? ' active' : ''), 'data-midx': String(i), 'data-mtype': m.type, draggable: true }, [tile, label, removeBtn]);
      thumb.addEventListener('click', (e) => {
        if (e.target.closest('.remove-btn')) return;
        selectMedia(i);
      });
      attachDrag(thumb, 'media');
      dom.thumbs.appendChild(thumb);
    });
  }
  const addBtn = el('div', { class: 'add-item', title: 'Add media' }, ['+']);
  addBtn.addEventListener('click', triggerAddMedia);
  dom.thumbs.appendChild(addBtn);
  dom.thumbButtons = [...dom.thumbs.querySelectorAll('.thumb')];
}
function setActiveThumb() {
  dom.thumbButtons.forEach((b, i) => b.classList.toggle('active', i === state.mediaIdx));
}

function updateName() {
  const artifact = curArt();
  const creation = curCre();
  const isArtifact = isArtifactView();
  const target = isArtifact ? artifact : creation;
  const isZh = state.lang === 'zh';
  const other = isZh ? 'en' : 'zh';
  dom.namePrimary.classList.toggle('is-zh', isZh);
  dom.nameSecondary.classList.toggle('is-zh', !isZh);
  dom.namePrimary.setAttribute('data-placeholder', isArtifact ? (isZh ? '展品名称' : 'Artifact name') : (isZh ? '学生姓名' : 'Student name'));
  dom.nameSecondary.setAttribute('data-placeholder', isZh ? '· english' : '· 中文');
  if (!target) {
    dom.namePrimary.textContent = ''; dom.nameSecondary.textContent = '';
    dom.editPrimary.style.display = 'none'; dom.editSecondary.style.display = 'none';
    return;
  }
  dom.editPrimary.style.display = ''; dom.editSecondary.style.display = '';
  const primary   = isArtifact ? target.title[state.lang] : target.name[state.lang];
  const secondary = isArtifact ? target.title[other]       : target.name[other];
  dom.namePrimary.textContent   = primary || '';
  dom.nameSecondary.textContent = secondary || '';
}

function updateDescription() {
  const isArtifact = isArtifactView();
  const artifact = curArt();
  const creation = curCre();
  const target = isArtifact ? artifact : creation;
  const desc = isArtifact ? artifact?.description : creation?.desc;
  const isZh = state.lang === 'zh';
  dom.description.classList.toggle('is-zh', isZh);
  dom.description.setAttribute('data-placeholder', isZh ? '描述 · 请输入' : 'Description · click to type');
  dom.description.textContent = target && desc ? (desc[state.lang] || '') : '';
  dom.editDesc.style.display = target ? '' : 'none';
}

function updateMeta() {
  const visible = isArtifactView();
  dom.metaRow.classList.toggle('visible', visible);
  if (!visible) return;
  const a = curArt(); if (!a) return;
  const isZh = state.lang === 'zh';
  const L = META_LABELS[state.lang];
  const fields = [
    { key: 'creator',           value: dom.metaCreator,    label: dom.creatorLabel },
    { key: 'period',            value: dom.metaPeriod,     label: dom.periodLabel },
    { key: 'owner',             value: dom.metaOwner,      label: dom.ownerLabel },
    { key: 'dimensions',        value: dom.metaDimensions, label: dom.dimensionsLabel },
    { key: 'discoveryLocation', value: dom.metaDiscovery,  label: dom.discoveryLabel },
  ];
  fields.forEach(f => {
    f.value.textContent = a[f.key]?.[state.lang] || '';
    f.value.classList.toggle('is-zh', isZh);
    f.value.setAttribute('data-placeholder', '—');
    f.label.textContent = L[f.key];
  });
}

let _mediaTimer = null;
function updateMedia(animate = true) {
  const source = currentSource();
  const media = sortMedia(source ?? { media: [] });
  const active = media[state.mediaIdx] ?? null;
  const swap = () => {
    clear(dom.mediaInner);
    if (!source || !active) {
      const empty = el('div', { class: 'media-empty' }, [
        el('div', {}, ['no media']),
        el('div', { style: 'font-size:10px;opacity:0.7' }, ['hover + click to add']),
      ]);
      dom.mediaInner.appendChild(empty);
      return;
    }
    if (active.type === '3d') {
      const glyph = el('div', { class: 'glyph' }, ['3D']);
      const label = el('div', { class: 'label' }, [state.lang === 'zh' ? '交互模型' : 'interactive model']);
      dom.mediaInner.appendChild(el('div', { class: 'media-3d' }, [glyph, label]));
    } else if (active.type === 'video') {
      dom.mediaInner.appendChild(el('img', { src: active.src, alt: '' }));
      dom.mediaInner.appendChild(el('div', { class: 'media-play' }));
    } else {
      dom.mediaInner.appendChild(el('img', { src: active.src, alt: '' }));
    }
  };
  if (!animate) { swap(); return; }
  dom.mediaInner.classList.add('fading');
  clearTimeout(_mediaTimer);
  _mediaTimer = setTimeout(() => { swap(); requestAnimationFrame(() => dom.mediaInner.classList.remove('fading')); }, 160);
}

  if (state.lang === 'en') { dom.langOn.textContent = 'EN'; dom.langOff.textContent = '中'; }

}

    const lbl = b.querySelector('.thumb-label');
    if (lbl) lbl.textContent = THUMB_LABEL[state.lang][t];
  });

function updateOriginalLabelLang() {
  const lbl = dom.avatars.querySelector('.avatar-original-label');
  if (lbl) lbl.textContent = ORIGINAL_LABEL[state.lang];
}

/* ── Editable bindings (branch on view) ───────────────────────── */
const otherLang = () => state.lang === 'en' ? 'zh' : 'en';
makeEditable(dom.namePrimary, dom.editPrimary,
  () => isArtifactView() ? (curArt()?.title[state.lang] ?? '') : (curCre()?.name[state.lang] ?? ''),
  (v) => { if (isArtifactView()) { const a = curArt(); if (a) a.title[state.lang] = v; buildTabs(); } else { const c = curCre(); if (c) c.name[state.lang] = v; } }
);
makeEditable(dom.nameSecondary, dom.editSecondary,
  () => isArtifactView() ? (curArt()?.title[otherLang()] ?? '') : (curCre()?.name[otherLang()] ?? ''),
  (v) => { if (isArtifactView()) { const a = curArt(); if (a) a.title[otherLang()] = v; } else { const c = curCre(); if (c) c.name[otherLang()] = v; } }
);
makeEditable(dom.description, dom.editDesc,
  () => { const a = curArt(), c = curCre(); if (isArtifactView()) return a?.description[state.lang] ?? ''; return c?.desc[state.lang] ?? ''; },
  (v) => { const a = curArt(), c = curCre(); if (isArtifactView()) { if (a) a.description[state.lang] = v; } else { if (c) c.desc[state.lang] = v; } },
  true
);
function bindMeta(valueEl, triggerEl, key) {
  makeEditable(valueEl, triggerEl,
    () => curArt()?.[key]?.[state.lang] ?? '',
    (v) => { const a = curArt(); if (a) a[key][state.lang] = v; }
  );
}
bindMeta(dom.metaCreator,    dom.editCreator,    'creator');
bindMeta(dom.metaPeriod,     dom.editPeriod,     'period');
bindMeta(dom.metaOwner,      dom.editOwner,      'owner');
bindMeta(dom.metaDimensions, dom.editDimensions, 'dimensions');
bindMeta(dom.metaDiscovery,  dom.editDiscovery,  'discoveryLocation');

/* ── Selection ────────────────────────────────────────────────── */
function selectArtifact(id) {
  if (id === state.artifactId) return;
  state.artifactId = id;
  state.creationId = null;   // default to the artifact entry
  state.mediaIdx = 0;
  setActiveTab(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
}
function selectArtifactEntry() {
  if (isArtifactView()) return;
  state.creationId = null;
  state.mediaIdx = 0;
  setActiveAvatar(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
}
function selectCreation(id) {
  if (id === state.creationId) return;
  state.creationId = id;
  state.mediaIdx = 0;
  setActiveAvatar(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
}
function selectMedia(idx) {
  if (idx === state.mediaIdx) return;
  state.mediaIdx = idx;
  setActiveThumb(); updateMedia();
}

/* ── Add / remove ─────────────────────────────────────────────── */
function blankBilingual(lang, value = '') {
  return lang === 'en' ? { en: value, zh: '' } : { en: '', zh: value };
}
function addArtifact() {
  const newArt = {
    id: uid('a'),
    title:             blankBilingual(state.lang, state.lang === 'en' ? 'New artifact' : '新展品'),
    icon:              '',
    creator:           { en: '', zh: '' },
    period:            { en: '', zh: '' },
    owner:             { en: '', zh: '' },
    dimensions:        { en: '', zh: '' },
    discoveryLocation: { en: '', zh: '' },
    description:       { en: '', zh: '' },
    media:             [],
    creations:         [],
  };
  data.artifacts.push(newArt);
  state.artifactId = newArt.id;
  state.creationId = null;
  state.mediaIdx = 0;
  buildTabs(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  markDirty();
  const newTab = dom.tabs.querySelector(`[data-aid="${newArt.id}"] .tab-title`);
  if (newTab) { setTimeout(() => dom.tabs.querySelector(`[data-aid="${newArt.id}"] .edit-icon`)?.click(), 50); }
}
function removeArtifact(id) {
  if (!confirm('Remove this artifact and all its students?')) return;
  const idx = data.artifacts.findIndex(a => a.id === id);
  data.artifacts.splice(idx, 1);
  if (state.artifactId === id) {
    state.artifactId = data.artifacts[0]?.id ?? null;
    state.creationId = null;
    state.mediaIdx = 0;
  }
  buildTabs(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  markDirty();
}

function addCreation() {
  const a = curArt(); if (!a) { alert('Add an artifact first.'); return; }
  const newCre = {
    id: uid('c'),
    name: blankBilingual(state.lang, state.lang === 'en' ? 'New student' : '新学生'),
    icon: '',
    desc: { en: '', zh: '' },
    media: [],
  };
  a.creations.push(newCre);
  state.creationId = newCre.id;
  state.mediaIdx = 0;
  buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  markDirty();
  setTimeout(() => dom.editPrimary.click(), 50);
}
function removeCreation(id) {
  if (!confirm('Remove this student?')) return;
  const a = curArt(); if (!a) return;
  const idx = a.creations.findIndex(c => c.id === id);
  a.creations.splice(idx, 1);
  if (state.creationId === id) { state.creationId = null; state.mediaIdx = 0; }
  buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  markDirty();
}

function detectMediaType(file) {
  if (file.type.startsWith('image/')) return 'image';
  if (file.type.startsWith('video/')) return 'video';
  const name = file.name.toLowerCase();
  if (name.endsWith('.glb') || name.endsWith('.gltf') || name.endsWith('.obj')) return '3d';
  return null;
}
function triggerAddMedia() {
  const source = currentSource();
  if (!source) { alert(isArtifactView() ? 'Add an artifact first.' : 'Add a student first.'); return; }
  dom.fileMedia.setAttribute('accept', 'image/*,video/*,.glb,.gltf,.obj');
  dom.fileMedia.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const type = detectMediaType(file);
    if (!type) { alert('Unsupported file type. Use image, video, or .glb/.gltf/.obj.'); return; }
    const item = type === '3d' ? { type: '3d' } : { type, src: URL.createObjectURL(file) };
    source.media.push(item);
    buildThumbs();
    const media = sortMedia(source);
    state.mediaIdx = media.indexOf(item);
    setActiveThumb(); updateMedia();
    markDirty();
    e.target.value = '';
  };
  dom.fileMedia.click();
}
function removeMedia(idx) {
  const source = currentSource(); if (!source) return;
  if (!confirm('Remove this media?')) return;
  const media = sortMedia(source);
  const item = media[idx];
  const origIdx = source.media.indexOf(item);
  if (origIdx !== -1) source.media.splice(origIdx, 1);
  state.mediaIdx = 0;
  buildThumbs(); updateMedia();
  markDirty();
}
function triggerMediaReplace() {
  const source = currentSource(); if (!source) { triggerAddMedia(); return; }
  const media = sortMedia(source);
  const active = media[state.mediaIdx] ?? null;
  if (!active) { triggerAddMedia(); return; }
  const accept = active.type === 'image' ? 'image/*' : active.type === 'video' ? 'video/*' : '.glb,.gltf,.obj';
  dom.fileMedia.setAttribute('accept', accept);
  dom.fileMedia.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const type = detectMediaType(file);
    if (!type) { alert('Unsupported file type.'); return; }
    if (type !== active.type) {
      if (!confirm(`You picked a ${type} to replace a ${active.type}. Replace anyway?`)) return;
    }
    const origIdx = source.media.indexOf(active);
    if (type === '3d') source.media[origIdx] = { type: '3d' };
    else source.media[origIdx] = { type, src: URL.createObjectURL(file) };
    buildThumbs();
    const newMedia = sortMedia(source);
    state.mediaIdx = newMedia.indexOf(source.media[origIdx]);
    setActiveThumb(); updateMedia();
    markDirty();
    e.target.value = '';
  };
  dom.fileMedia.click();
}
function triggerIconUpload(creationId) {
  const a = curArt();
  const c = a?.creations.find(x => x.id === creationId);
  if (!c) return;
  dom.fileIcon.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    c.icon = URL.createObjectURL(file);
    buildAvatars();
    markDirty();
    e.target.value = '';
  };
  dom.fileIcon.click();
}
function triggerArtifactIconUpload() {
  const a = curArt(); if (!a) return;
  dom.fileIcon.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    a.icon = URL.createObjectURL(file);
    buildAvatars();
    markDirty();
    e.target.value = '';
  };
  dom.fileIcon.click();
}

/* ── Drag-and-drop reorder (students + media only; default artifact entry & tabs reorder as before) */
let drag = null;
function attachDrag(node, kind) {
  node.addEventListener('dragstart', (e) => {
    if (e.target.closest('[contenteditable="true"]')) { e.preventDefault(); return; }
    drag = { kind, node };
    if (kind === 'artifact') drag.id = node.dataset.aid;
    else if (kind === 'creation') drag.id = node.dataset.cid;
    else if (kind === 'media') drag.idx = Number(node.dataset.midx);
    node.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', kind);
  });
  node.addEventListener('dragend', () => {
    node.classList.remove('dragging');
    document.querySelectorAll('.drop-target-before,.drop-target-after,.drop-target-above,.drop-target-below')
      .forEach(n => n.classList.remove('drop-target-before', 'drop-target-after', 'drop-target-above', 'drop-target-below'));
    drag = null;
  });
  node.addEventListener('dragover', (e) => {
    if (!drag || drag.kind !== kind || drag.node === node) return;
    e.preventDefault();
    const r = node.getBoundingClientRect();
    document.querySelectorAll('.drop-target-before,.drop-target-after,.drop-target-above,.drop-target-below')
      .forEach(n => n.classList.remove('drop-target-before', 'drop-target-after', 'drop-target-above', 'drop-target-below'));
    if (kind === 'artifact') {
      const midX = r.left + r.width / 2;
      node.classList.add(e.clientX < midX ? 'drop-target-before' : 'drop-target-after');
    } else {
      const midY = r.top + r.height / 2;
      node.classList.add(e.clientY < midY ? 'drop-target-above' : 'drop-target-below');
    }
  });
  node.addEventListener('drop', (e) => {
    if (!drag || drag.kind !== kind || drag.node === node) return;
    e.preventDefault();
    const r = node.getBoundingClientRect();
    if (kind === 'artifact') reorderArtifact(drag.id, node.dataset.aid, e.clientX < r.left + r.width / 2);
    else if (kind === 'creation') reorderCreation(drag.id, node.dataset.cid, e.clientY < r.top + r.height / 2);
    else if (kind === 'media') reorderMedia(drag.idx, Number(node.dataset.midx), e.clientY < r.top + r.height / 2);
  });
}
function reorderArtifact(draggedId, targetId, insertBefore) {
  const from = data.artifacts.findIndex(a => a.id === draggedId);
  if (from < 0) return;
  const [item] = data.artifacts.splice(from, 1);
  let insertAt = data.artifacts.findIndex(a => a.id === targetId);
  if (insertAt < 0) insertAt = data.artifacts.length;
  if (!insertBefore) insertAt += 1;
  data.artifacts.splice(insertAt, 0, item);
  buildTabs();
  markDirty();
}
function reorderCreation(draggedId, targetId, insertBefore) {
  const a = curArt(); if (!a) return;
  const from = a.creations.findIndex(c => c.id === draggedId);
  if (from < 0) return;
  const [item] = a.creations.splice(from, 1);
  let insertAt = a.creations.findIndex(c => c.id === targetId);
  if (insertAt < 0) insertAt = a.creations.length;
  if (!insertBefore) insertAt += 1;
  a.creations.splice(insertAt, 0, item);
  buildAvatars();
  markDirty();
}
function reorderMedia(fromSortedIdx, toSortedIdx, insertBefore) {
  const source = currentSource(); if (!source) return;
  const sorted = sortMedia(source);
  const item = sorted[fromSortedIdx]; const target = sorted[toSortedIdx];
  if (!item || !target) return;
  if (item.type !== target.type) { alert('Reorder only within the same media-type group (3D · video · image).'); return; }
  const origFrom = source.media.indexOf(item);
  source.media.splice(origFrom, 1);
  let origTo = source.media.indexOf(target);
  if (!insertBefore) origTo += 1;
  source.media.splice(origTo, 0, item);
  const newSorted = sortMedia(source);
  state.mediaIdx = newSorted.indexOf(item);
  buildThumbs();
  markDirty();
}

/* ── Admin bar actions ───────────────────────────────────────── */
$('btnSave').addEventListener('click', () => {
  console.group('%c[admin] SAVE → payload', 'color:#ededed;background:#262626;padding:2px 8px');
  console.log(JSON.parse(JSON.stringify(data)));
  console.groupEnd();
  markClean();
  alert('Logged to console. In Phase B this would POST to the admin endpoint.');
});
$('btnExport').addEventListener('click', async () => {
  const text = JSON.stringify(data, null, 2);
  try { await navigator.clipboard.writeText(text); alert('JSON copied to clipboard.'); }
  catch { console.log(text); alert('Clipboard blocked. JSON logged to console.'); }
});
$('btnReset').addEventListener('click', () => {
  if (!confirm('Reset to initial mock data? Unsaved changes will be lost.')) return;
  data = initialData();
  state.artifactId = data.artifacts[0]?.id ?? null;
  state.creationId = null;
  state.mediaIdx = 0;
  buildTabs(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia(false); updateLangToggle();
  markClean();
});

dom.langToggle.addEventListener('click', () => {
  state.lang = state.lang === 'en' ? 'zh' : 'en';
  updateLangToggle();
  buildTabs();
  updateName(); updateDescription(); updateMeta();
  updateThumbsLang();
  updateOriginalLabelLang();
  updateMedia(false);
});

$('btnAddArtifact').addEventListener('click', addArtifact);
dom.mediaUpload.addEventListener('click', triggerMediaReplace);

window.addEventListener('beforeunload', (e) => {
  if (state.dirty) { e.preventDefault(); e.returnValue = ''; }
});

function fit() {
  const wrap = $('wrap');
  const available = window.innerHeight - 120;
  const scale = Math.min(1, available / 960);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width  = (1080 * scale) + 'px';
  wrap.style.height = (960  * scale) + 'px';
}
window.addEventListener('resize', fit);
fit();

/* Initial render — default artifact entry is selected */
buildTabs(); buildAvatars(); buildThumbs();
updateName(); updateDescription(); updateMeta();
updateMedia(false); updateLangToggle();
</script>
