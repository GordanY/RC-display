:root {
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1A1A1A;
  --border: #262626; --border-hi: #404040;
  --text: #EDEDED; --muted: #8F8F8F; --dim: #5A5A5A;
  --ease: cubic-bezier(0.22, 0.9, 0.3, 1);
  --font-sans: 'Geist', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', Menlo, monospace;
  --font-cn:   'Noto Sans SC', 'PingFang SC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100%; background: #080808;
  font-family: var(--font-sans); color: var(--text);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
}
body { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
.preview-note { font-family: var(--font-mono); font-size: 11px; color: var(--dim); letter-spacing: 0.05em; }

.kiosk-wrap { width: 1080px; height: 1920px; transform-origin: top center; }
.kiosk {
  width: 1080px; height: 1920px; position: relative; overflow: hidden;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* TOP HALF */
.top { height: 960px; padding: 64px 64px 48px; display: flex; flex-direction: column; gap: 40px; }

.header { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; border-bottom: 1px solid var(--border); }
.tabs {
  flex: 1; display: flex; gap: 44px; overflow-x: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 40px), transparent 100%);
          mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 40px), transparent 100%);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; position: relative;
  background: transparent; border: none; cursor: pointer;
  padding: 20px 0; text-align: left; min-height: 48px;
  color: var(--muted); transition: color 180ms var(--ease);
}
.tab:hover { color: var(--text); }
.tab-title { font-size: 30px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.1; white-space: nowrap; color: inherit; }
.tab::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 1px; background: var(--text);
  transform: scaleX(0); transform-origin: left;
  transition: transform 280ms var(--ease);
}
.tab.active { color: var(--text); }
.tab.active::after { transform: scaleX(1); }

.lang-toggle {
  flex-shrink: 0; display: flex; align-items: baseline; gap: 10px;
  background: transparent; border: none; cursor: pointer;
  padding: 20px 0; min-height: 48px;
  font-family: var(--font-sans); font-size: 30px; font-weight: 500;
  color: var(--muted); letter-spacing: -0.015em; line-height: 1.1;
  transition: color 180ms var(--ease);
}
.lang-toggle:hover { color: var(--text); }
.lang-toggle .on  { color: var(--text); }
.lang-toggle .off { color: var(--dim); }
.lang-toggle .sep { color: var(--dim); font-weight: 400; }

.main { flex: 1; display: grid; grid-template-columns: 128px 1fr 128px; gap: 40px; min-height: 0; }

.avatars {
  display: flex; flex-direction: column; gap: 20px; overflow-y: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 40px), transparent 100%);
          mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 40px), transparent 100%);
}
.avatars::-webkit-scrollbar { display: none; }
.avatar {
  flex-shrink: 0; width: 104px; height: 104px; border-radius: 50%;
  background-color: var(--surface); background-size: cover; background-position: center;
  border: 1px solid var(--border); cursor: pointer; padding: 0; position: relative;
  transition: border-color 200ms var(--ease);
  filter: saturate(0.85);
}
.avatar:hover { border-color: var(--border-hi); }
.avatar.active { border-color: var(--text); filter: saturate(1); }
.avatar.active::after {
  content: ""; position: absolute; inset: -5px; border-radius: 50%;
  border: 1px solid var(--text);
}
.avatar-with-label { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.avatar-original-label {
  font-family: var(--font-mono); font-size: 9px; color: var(--dim);
  letter-spacing: 0.18em; text-transform: uppercase; text-align: center;
  user-select: none; white-space: nowrap;
}

/* Center */
.center { display: flex; flex-direction: column; gap: 24px; min-width: 0; min-height: 0; }
.name { display: flex; align-items: baseline; gap: 16px; min-height: 56px; }
.name-primary { font-size: 48px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; color: var(--text); }
.name-primary.is-zh { font-family: var(--font-cn); font-weight: 500; letter-spacing: 0; }
.name-secondary { font-family: var(--font-mono); font-size: 14px; font-weight: 400; color: var(--muted); letter-spacing: 0.04em; }
.name-secondary.is-zh { font-family: var(--font-cn); font-size: 18px; letter-spacing: 0; }

/* Meta row — shown only when default artifact entry is selected */
.meta-row {
  display: none;
  flex-wrap: wrap; gap: 14px 28px;
  padding: 12px 0 14px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.meta-row.visible { display: flex; }
.meta-field { display: inline-flex; align-items: baseline; gap: 8px; }
.meta-label { font-family: var(--font-mono); font-size: 10px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
.meta-value { font-family: var(--font-sans); font-size: 15px; font-weight: 400; color: var(--text); letter-spacing: -0.005em; }
.meta-value.is-zh { font-family: var(--font-cn); font-size: 16px; letter-spacing: 0; }
.meta-value:empty::before { content: "—"; color: var(--dim); opacity: 0.5; }

.media { flex: 1; min-height: 0; position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
.media-inner {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 1; transition: opacity 220ms var(--ease);
}
.media-inner.fading { opacity: 0; }
.media-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.media-3d { display: flex; flex-direction: column; align-items: center; gap: 16px; background: var(--surface); }
.media-3d .glyph { font-size: 96px; font-weight: 500; letter-spacing: -0.04em; color: var(--text); line-height: 1; }
.media-3d .label { font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.media-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(10,10,10,0.55); backdrop-filter: blur(8px);
  border: 1px solid rgba(237,237,237,0.3);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.media-play::before { content: ""; width: 0; height: 0; border-left: 18px solid var(--text); border-top: 11px solid transparent; border-bottom: 11px solid transparent; margin-left: 5px; }

.description { min-height: 120px; max-height: 160px; overflow-y: auto; scrollbar-width: thin; padding-top: 4px; }
.description p { font-size: 17px; font-weight: 400; line-height: 1.55; color: var(--text); max-width: 58ch; letter-spacing: -0.005em; }
.description p.is-zh { font-family: var(--font-cn); font-size: 18px; line-height: 1.75; letter-spacing: 0; }

.thumbs {
  display: flex; flex-direction: column; gap: 18px; overflow-y: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 40px), transparent 100%);
          mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 40px), transparent 100%);
}
.thumbs::-webkit-scrollbar { display: none; }
.thumb { flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; background: transparent; border: none; padding: 0; cursor: pointer; }
.thumb-tile { width: 104px; height: 104px; position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); transition: border-color 200ms var(--ease); }
.thumb:hover .thumb-tile { border-color: var(--border-hi); }
.thumb.active .thumb-tile { border-color: var(--text); }
.thumb-tile img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.85); transition: filter 200ms var(--ease); }
.thumb:hover .thumb-tile img, .thumb.active .thumb-tile img { filter: saturate(1); }
.thumb-3d { display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 500; letter-spacing: -0.03em; color: var(--text); background: var(--surface-2); }
.thumb-video-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 0; height: 0; border-left: 12px solid var(--text); border-top: 7px solid transparent; border-bottom: 7px solid transparent; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
.thumb-label { font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--muted); letter-spacing: 0.06em; text-align: left; padding-left: 2px; }
.thumb.active .thumb-label { color: var(--text); }

/* BOTTOM HALF (literally empty) */
.bottom { height: 960px; background: var(--bg); }

@media (hover: none) {
  .tab:hover { color: var(--muted); }
  .tab.active:hover, .tab.active { color: var(--text); }
  .avatar:hover { border-color: var(--border); }
  .avatar.active { border-color: var(--text); }
  .thumb:hover .thumb-tile { border-color: var(--border); }
  .thumb.active .thumb-tile { border-color: var(--text); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>

<script>

const data = {

const ORIGINAL_LABEL = { en: 'ORIGINAL · 原作', zh: '原作 · ORIGINAL' };
const MEDIA_ORDER = { '3d': 0, 'video': 1, 'image': 2 };
const sortMedia = (c) => [...(c?.media ?? [])].sort((a, b) => MEDIA_ORDER[a.type] - MEDIA_ORDER[b.type]);

const state = {
  lang: 'en',
  artifactId: data.artifacts[0].id,
  creationId: null,  // null = default artifact entry selected
  mediaIdx: 0,
};
const curArt = () => data.artifacts.find(a => a.id === state.artifactId);
const curCre = () => state.creationId === null ? null : (curArt()?.creations.find(c => c.id === state.creationId) ?? null);
const isArtifactView = () => state.creationId === null;
const currentSource = () => isArtifactView() ? curArt() : curCre();

const $ = (id) => document.getElementById(id);
const dom = {
  tabs: $('tabs'), avatars: $('avatars'), thumbs: $('thumbs'),
  media: $('media'), mediaInner: $('mediaInner'),
  namePrimary: $('namePrimary'), nameSecondary: $('nameSecondary'),
  description: $('description'),
  langToggle: $('langToggle'), langOn: $('langOn'), langOff: $('langOff'),
  metaRow: $('metaRow'),
  metaCreator: $('metaCreator'), metaPeriod: $('metaPeriod'), metaOwner: $('metaOwner'),
  metaDimensions: $('metaDimensions'), metaDiscovery: $('metaDiscovery'),
  creatorLabel: $('creatorLabel'), periodLabel: $('periodLabel'), ownerLabel: $('ownerLabel'),
  dimensionsLabel: $('dimensionsLabel'), discoveryLabel: $('discoveryLabel'),
  tabButtons: [], avatarButtons: [], thumbButtons: [],
};

function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style') e.style.cssText = props[k];
    else if (k.startsWith('data-') || k.startsWith('aria-') || k === 'title' || k === 'src' || k === 'alt') e.setAttribute(k, props[k]);
    else e[k] = props[k];
  }
  for (const c of children) { if (c == null) continue; e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); }
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

/* ── Builders ─────────────────────────────────────────────── */
function buildTabs() {
  clear(dom.tabs);
  data.artifacts.forEach(a => {
    const title = el('span', { class: 'tab-title' }, [a.title[state.lang] || '']);
    const tab = el('button', { class: 'tab' + (a.id === state.artifactId ? ' active' : ''), 'data-aid': a.id }, [title]);
    dom.tabs.appendChild(tab);
  });
  dom.tabButtons = [...dom.tabs.querySelectorAll('.tab')];
}
function setActiveTab() {
  dom.tabButtons.forEach(b => b.classList.toggle('active', b.dataset.aid === state.artifactId));
}

function buildAvatars() {
  clear(dom.avatars);
  const artifact = curArt();
  if (!artifact) return;
  // Default artifact entry (first, with ORIGINAL label)
  const originalRing = el('div', {
    class: 'avatar' + (isArtifactView() ? ' active' : ''),
    'data-cid': '__artifact__',
    'aria-label': artifact.title.en,
  });
  if (artifact.icon) originalRing.style.backgroundImage = `url('${artifact.icon}')`;
  const originalLabel = el('div', { class: 'avatar-original-label' }, [ORIGINAL_LABEL[state.lang]]);
  const originalWrap = el('div', { class: 'avatar-with-label' }, [originalRing, originalLabel]);
  dom.avatars.appendChild(originalWrap);
  // Student creations
  artifact.creations.forEach(c => {
    const ring = el('div', {
      class: 'avatar' + (c.id === state.creationId ? ' active' : ''),
      'data-cid': c.id, 'aria-label': c.name.en,
    });
    if (c.icon) ring.style.backgroundImage = `url('${c.icon}')`;
    dom.avatars.appendChild(ring);
  });
  dom.avatarButtons = [...dom.avatars.querySelectorAll('.avatar')];
}
function setActiveAvatar() {
  dom.avatarButtons.forEach(b => {
    const cid = b.dataset.cid;
    const active = (cid === '__artifact__' && isArtifactView()) || (cid !== '__artifact__' && cid === state.creationId);
    b.classList.toggle('active', active);
  });
}

function buildThumbs() {
  clear(dom.thumbs);
  const source = currentSource();
  if (!source) return;
  const media = sortMedia(source);
  media.forEach((m, i) => {
    let tile;
    if (m.type === '3d') tile = el('div', { class: 'thumb-tile thumb-3d' }, ['3D']);
    else if (m.type === 'video') tile = el('div', { class: 'thumb-tile' }, [el('img', { src: m.src, alt: '' }), el('div', { class: 'thumb-video-badge' })]);
    else tile = el('div', { class: 'thumb-tile' }, [el('img', { src: m.src, alt: '' })]);
    const label = el('span', { class: 'thumb-label' }, [THUMB_LABEL[state.lang][m.type]]);
    const thumb = el('button', { class: 'thumb' + (i === state.mediaIdx ? ' active' : ''), 'data-midx': String(i), 'data-mtype': m.type }, [tile, label]);
    dom.thumbs.appendChild(thumb);
  });
  dom.thumbButtons = [...dom.thumbs.querySelectorAll('.thumb')];
}
function setActiveThumb() {
  dom.thumbButtons.forEach((b, i) => b.classList.toggle('active', i === state.mediaIdx));
}

function updateName() {
  const isArtifact = isArtifactView();
  const target = isArtifact ? curArt() : curCre();
  if (!target) { dom.namePrimary.textContent = ''; dom.nameSecondary.textContent = ''; return; }
  const isZh = state.lang === 'zh';
  const other = isZh ? 'en' : 'zh';
  const primary   = isArtifact ? target.title[state.lang] : target.name[state.lang];
  const secondary = isArtifact ? target.title[other]       : target.name[other];
  dom.namePrimary.classList.toggle('is-zh', isZh);
  dom.nameSecondary.classList.toggle('is-zh', !isZh);
  dom.namePrimary.textContent = primary || '';
  dom.nameSecondary.textContent = secondary || '';
}

function updateDescription() {
  const isArtifact = isArtifactView();
  const target = isArtifact ? curArt() : curCre();
  const desc = isArtifact ? curArt()?.description : curCre()?.desc;
  const isZh = state.lang === 'zh';
  dom.description.classList.toggle('is-zh', isZh);
  dom.description.textContent = target && desc ? (desc[state.lang] || '') : '';
}

function updateMeta() {
  const visible = isArtifactView();
  dom.metaRow.classList.toggle('visible', visible);
  if (!visible) return;
  const a = curArt(); if (!a) return;
  const isZh = state.lang === 'zh';
  const L = META_LABELS[state.lang];
  const set = (valueEl, labelEl, key) => {
    valueEl.textContent = a[key]?.[state.lang] || '';
    valueEl.classList.toggle('is-zh', isZh);
    labelEl.textContent = L[key];
  };
  set(dom.metaCreator,    dom.creatorLabel,    'creator');
  set(dom.metaPeriod,     dom.periodLabel,     'period');
  set(dom.metaOwner,      dom.ownerLabel,      'owner');
  set(dom.metaDimensions, dom.dimensionsLabel, 'dimensions');
  set(dom.metaDiscovery,  dom.discoveryLabel,  'discoveryLocation');
}

let _mediaTimer = null;
function updateMedia(animate = true) {
  const source = currentSource();
  const media = sortMedia(source ?? { media: [] });
  const active = media[state.mediaIdx] ?? media[0];
  const swap = () => {
    clear(dom.mediaInner);
    if (!active) return;
    if (active.type === '3d') {
      const glyph = el('div', { class: 'glyph' }, ['3D']);
      const label = el('div', { class: 'label' }, [state.lang === 'zh' ? '交互模型' : 'interactive model']);
      dom.mediaInner.appendChild(el('div', { class: 'media-3d' }, [glyph, label]));
    } else if (active.type === 'video') {
      dom.mediaInner.appendChild(el('img', { src: active.src, alt: '' }));
      dom.mediaInner.appendChild(el('div', { class: 'media-play' }));
    } else {
      dom.mediaInner.appendChild(el('img', { src: active.src, alt: '' }));
    }
  };
  if (!animate) { swap(); return; }
  dom.mediaInner.classList.add('fading');
  clearTimeout(_mediaTimer);
  _mediaTimer = setTimeout(() => { swap(); requestAnimationFrame(() => dom.mediaInner.classList.remove('fading')); }, 160);
}

function updateLangToggle() {
  if (state.lang === 'en') { dom.langOn.textContent = 'EN'; dom.langOff.textContent = '中'; }
  else                     { dom.langOn.textContent = '中'; dom.langOff.textContent = 'EN'; }
}
function updateThumbsLang() {
  dom.thumbButtons.forEach(b => {
    const t = b.dataset.mtype;
    const lbl = b.querySelector('.thumb-label');
    if (lbl) lbl.textContent = THUMB_LABEL[state.lang][t];
  });
}
function updateOriginalLabelLang() {
  const lbl = dom.avatars.querySelector('.avatar-original-label');
  if (lbl) lbl.textContent = ORIGINAL_LABEL[state.lang];
}

/* ── Handlers (granular) ─────────────────────────────────── */
dom.tabs.addEventListener('click', (e) => {
  const b = e.target.closest('[data-aid]'); if (!b) return;
  if (b.dataset.aid === state.artifactId) return;
  state.artifactId = b.dataset.aid;
  state.creationId = null;   // default to artifact entry
  state.mediaIdx = 0;
  setActiveTab(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
});
dom.avatars.addEventListener('click', (e) => {
  const b = e.target.closest('[data-cid]'); if (!b) return;
  const cid = b.dataset.cid;
  if (cid === '__artifact__') {
    if (isArtifactView()) return;
    state.creationId = null; state.mediaIdx = 0;
    setActiveAvatar(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  } else {
    if (cid === state.creationId) return;
    state.creationId = cid; state.mediaIdx = 0;
    setActiveAvatar(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
  }
});
dom.thumbs.addEventListener('click', (e) => {
  const b = e.target.closest('[data-midx]'); if (!b) return;
  const idx = Number(b.dataset.midx);
  if (idx === state.mediaIdx) return;
  state.mediaIdx = idx;
  setActiveThumb(); updateMedia();
});
dom.langToggle.addEventListener('click', () => {
  state.lang = state.lang === 'en' ? 'zh' : 'en';
  updateLangToggle();
  dom.tabButtons.forEach((b, i) => { b.querySelector('.tab-title').textContent = data.artifacts[i].title[state.lang] || ''; });
  updateName(); updateDescription(); updateMeta();
  updateThumbsLang();
  updateOriginalLabelLang();
  updateMedia(false);
});

document.addEventListener('keydown', (e) => {
  const artifacts = data.artifacts;
  const artifact = curArt();
  const creations = artifact?.creations ?? [];
  const media = sortMedia(currentSource());

  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const d = e.key === 'ArrowRight' ? 1 : -1;
    const idx = artifacts.indexOf(artifact);
    const next = artifacts[(idx + d + artifacts.length) % artifacts.length];
    state.artifactId = next.id; state.creationId = null; state.mediaIdx = 0;
    setActiveTab(); buildAvatars(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
    e.preventDefault();
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    // Order: [artifact entry, creation 0, creation 1, ...]
    const seq = [null, ...creations.map(c => c.id)];
    const cur = seq.indexOf(state.creationId);
    const d = e.key === 'ArrowDown' ? 1 : -1;
    const nxt = seq[(cur + d + seq.length) % seq.length];
    state.creationId = nxt; state.mediaIdx = 0;
    setActiveAvatar(); buildThumbs(); updateName(); updateDescription(); updateMeta(); updateMedia();
    e.preventDefault();
  } else if (/^[1-9]$/.test(e.key)) {
    const n = Number(e.key) - 1;
    if (n < media.length) { state.mediaIdx = n; setActiveThumb(); updateMedia(); }
  } else if (e.key.toLowerCase() === 'l') {
    dom.langToggle.click();
  }
});

function fit() {
  const wrap = $('wrap');
  const available = window.innerHeight - 80;
  const scale = Math.min(1, available / 1920);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = (1080 * scale) + 'px';
  wrap.style.height = (1920 * scale) + 'px';
}
window.addEventListener('resize', fit);
fit();

/* Initial render — default artifact entry is selected */
buildTabs(); buildAvatars(); buildThumbs();
updateName(); updateDescription(); updateMeta(); updateMedia(false); updateLangToggle();
</script>
</body>
</html>
