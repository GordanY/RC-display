<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>RC-display — Admin v2</title>
<style>
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geistmono-1.woff2) format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/geistmono-2.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 400; font-display: swap;
  src: url(./fonts/notosans-0.woff2) format('woff2'); }
@font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 500; font-display: swap;
  src: url(./fonts/notosans-1.woff2) format('woff2'); }

:root {
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1A1A1A;
  --border: #262626; --border-hi: #404040;
  --text: #EDEDED; --muted: #8F8F8F; --dim: #5A5A5A;
  --danger: #EF4444; --ease: cubic-bezier(0.22, 0.9, 0.3, 1);
  --font-cn:   'Noto Sans SC', 'PingFang TC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft JhengHei', sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; background: #080808; font-family: var(--font-cn); color: var(--text); -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }

.admin-bar {
  width: 1080px; display: flex; align-items: center; gap: 14px;
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.06em;
  color: var(--muted); text-transform: uppercase;
}
.admin-bar .badge { padding: 4px 8px; border: 1px solid var(--border-hi); color: var(--text); }
.admin-bar .dirty { display: flex; align-items: center; gap: 6px; }
.admin-bar .dirty .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 200ms var(--ease); }
.admin-bar .dirty.is-dirty .dot { background: var(--danger); }
.admin-bar .dirty.is-dirty .text { color: var(--text); }
.admin-bar .spacer { flex: 1; }
.admin-bar button {
  background: transparent; border: 1px solid var(--border-hi); color: var(--text);
  padding: 6px 12px; cursor: pointer; font: inherit; letter-spacing: 0.06em;
  text-transform: uppercase; transition: all 150ms var(--ease);
}
.admin-bar button:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
.admin-bar button.danger { color: var(--muted); }
.admin-bar button.danger:hover { background: var(--danger); color: var(--bg); border-color: var(--danger); }

.admin-frame-wrap { width: 1080px; transform-origin: top center; }
.admin-frame { width: 1080px; height: 1920px; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; }
.content { padding: 48px; display: flex; flex-direction: column; }

.exhibit-title-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; position: relative; }
.exhibit-title {
  font-family: var(--font-cn); font-size: 36px; font-weight: 500;
  color: var(--text); line-height: 1.2; letter-spacing: 0.01em;
}

.tabs-wrap { display: flex; align-items: stretch; gap: 12px; }
.tabs {
  flex: 1; display: flex; gap: 12px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
          mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; position: relative;
  padding: 14px 30px; min-height: 56px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer;
  font-family: var(--font-cn); font-size: 26px; font-weight: 500;
  color: var(--muted); white-space: nowrap;
  transition: all 180ms var(--ease);
  display: inline-flex; align-items: center; gap: 10px;
}
.tab:hover { color: var(--text); border-color: var(--border-hi); }
.tab.active { color: var(--text); border-color: var(--text); background: var(--surface-2); }
.tab-title { display: inline-block; }

.add-tile {
  flex-shrink: 0;
  background: transparent; border: 1px dashed var(--border);
  color: var(--dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 31px; font-weight: 300;
  transition: all 180ms var(--ease);
}
.add-tab { padding: 14px 22px; min-height: 56px; }
.add-tab:hover, .add-thumb:hover { border-color: var(--text); color: var(--text); }

.canvas {
  margin-top: 28px;
  width: 100%; aspect-ratio: 1 / 1;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 50% 50%, var(--surface-2) 0%, var(--surface) 75%, var(--bg) 100%);
  border: 1px solid var(--border);
}
.canvas-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; opacity: 1; transition: opacity 240ms var(--ease); }
.canvas-inner.fading { opacity: 0; }
.canvas-3d { font-size: 202px; font-weight: 500; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
.canvas-caption { font-family: var(--font-mono); font-size: 13px; color: var(--dim); letter-spacing: 0.2em; text-transform: uppercase; }
.canvas-model-filename { font-family: var(--font-mono); font-size: 12px; color: var(--dim); opacity: 0.6; letter-spacing: 0.15em; }

.canvas-footer {
  position: absolute; bottom: 28px; right: 32px; z-index: 3;
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  text-align: right;
}
.canvas-footer.hidden { display: none; }
.canvas-footer-row { display: inline-flex; align-items: baseline; gap: 6px; }
.canvas-footer .primary-text { font-family: var(--font-cn); font-size: 34px; font-weight: 500; color: var(--text); line-height: 1.1; }
.canvas-footer .secondary-text { font-family: var(--font-cn); font-size: 18px; font-weight: 400; color: var(--muted); line-height: 1.3; }
.canvas-footer [data-placeholder]:not([contenteditable="true"]):empty::before { content: attr(data-placeholder); color: var(--dim); opacity: 0.55; }

.mode-toggle {
  margin-top: 8px;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-cn); font-size: 14px;
  background: rgba(10,10,10,0.5); backdrop-filter: blur(6px);
  padding: 5px 10px; border: 1px solid var(--border);
}
.mode-toggle .mode-opt { color: var(--dim); cursor: pointer; padding: 0 2px; transition: color 150ms var(--ease); }
.mode-toggle .mode-opt:hover { color: var(--muted); }
.mode-toggle .mode-opt.active { color: var(--text); font-weight: 500; }
.mode-toggle .mode-sep { color: var(--dim); }

/* Canvas upload pencil (top right of canvas) */
.canvas-upload {
  position: absolute; top: 16px; right: 16px; z-index: 4;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(10,10,10,0.6); backdrop-filter: blur(6px);
  border: 1px solid var(--border-hi); color: var(--text);
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: all 150ms var(--ease);
}
.canvas:hover .canvas-upload { opacity: 1; pointer-events: auto; }
.canvas-upload:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

.section { margin-top: 32px; position: relative; }
.section-label-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; position: relative; }
.section-label {
  font-family: var(--font-cn);
  font-size: 22px; font-weight: 500;
  color: var(--text); line-height: 1.2;
}

/* Student thumbs */
.thumbs {
  display: flex; gap: 16px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
          mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 30px), transparent 100%);
  padding-bottom: 2px;
}
.thumbs::-webkit-scrollbar { display: none; }
.thumb { flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; cursor: pointer; background: transparent; border: none; padding: 0; position: relative; }
.thumb-tile { width: 168px; height: 128px; background: var(--surface); border: 1px solid var(--border); overflow: hidden; position: relative; transition: border-color 180ms var(--ease); }
.thumb-tile img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.8); transition: filter 180ms var(--ease); }
.thumb-tile.empty { border-style: dashed; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 38px; font-weight: 300; }
.thumb:hover .thumb-tile { border-color: var(--border-hi); }
.thumb.active .thumb-tile { border-color: var(--text); }
.thumb:hover .thumb-tile img, .thumb.active .thumb-tile img { filter: saturate(1); }
.thumb-name { font-family: var(--font-cn); font-size: 18px; font-weight: 400; color: var(--muted); text-align: left; letter-spacing: 0.02em; transition: color 180ms var(--ease); }
.thumb.active .thumb-name { color: var(--text); }
.add-thumb { width: 168px; height: 128px; }

.description { font-family: var(--font-cn); font-size: 20px; line-height: 1.75; color: var(--text); max-width: 62ch; min-height: 90px; letter-spacing: 0.01em; }

/* Editable */
[contenteditable="true"] { outline: none; border-bottom: 1px dashed var(--text); background: var(--surface-2); padding: 1px 4px; margin: -1px -4px; border-radius: 2px; min-width: 4ch; }
[data-placeholder]:not([contenteditable="true"]):empty::before { content: attr(data-placeholder); color: var(--dim); opacity: 0.55; letter-spacing: 0; pointer-events: none; }

.edit-icon {
  background: transparent; border: none; padding: 4px; cursor: pointer;
  color: var(--dim); display: inline-flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; border-radius: 2px;
  transition: color 150ms var(--ease), opacity 150ms var(--ease), background 150ms var(--ease);
  vertical-align: baseline;
}
.edit-icon:hover { color: var(--text); background: var(--surface-2); }
.edit-icon.always { opacity: 1; pointer-events: auto; color: var(--muted); }

.tab:hover > .edit-icon,
.exhibit-title-row:hover > .edit-icon,
.section:hover > .edit-icon,
.thumb:hover > .thumb-edit,
.canvas:hover > .canvas-upload { opacity: 1; pointer-events: auto; }

.section > .edit-icon { position: absolute; top: 0; right: 0; }

/* Footer edit icons — visible because they operate on specific rows */
.canvas-footer .edit-icon { opacity: 1; pointer-events: auto; color: var(--muted); }
.canvas-footer .edit-icon:hover { color: var(--text); }

.thumb-edit {
  position: absolute; top: -7px; right: 22px; z-index: 5;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border-hi);
  color: var(--muted); cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: all 150ms var(--ease);
}
.thumb-edit:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

.remove-btn {
  position: absolute; top: -7px; right: -7px; z-index: 6;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border-hi);
  color: var(--muted); cursor: pointer; padding: 0;
  font-family: var(--font-mono); font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: all 150ms var(--ease);
}
.tab:hover .remove-btn, .thumb:hover .remove-btn { opacity: 1; pointer-events: auto; }
.remove-btn:hover { background: var(--danger); border-color: var(--danger); color: var(--bg); }
.tab .remove-btn { top: 6px; right: 6px; }

.dragging { opacity: 0.25; }
.drop-target-before { box-shadow: -3px 0 0 0 var(--text); }
.drop-target-after  { box-shadow:  3px 0 0 0 var(--text); }

@media (hover: none) {
  .remove-btn, .edit-icon, .canvas-upload, .thumb-edit { opacity: 0.6 !important; pointer-events: auto !important; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="admin-bar">
  <span class="badge">ADMIN v2</span>
  <span class="dirty" id="dirtyBadge"><span class="dot"></span><span class="text">clean · no unsaved changes</span></span>
  <span class="spacer"></span>
  <button id="btnSave">save → console</button>
  <button id="btnExport">export json</button>
  <button id="btnReset" class="danger">reset mock</button>
</div>

<div class="admin-frame-wrap" id="wrap">
  <div class="admin-frame">
    <div class="content">

      <div class="exhibit-title-row">
        <h1 class="exhibit-title" id="exhibitTitle" data-placeholder="展覽名稱"></h1>
        <button class="edit-icon" id="editExhibitTitle" title="編輯展覽名稱" aria-label="編輯展覽名稱"></button>
      </div>

      <div class="tabs-wrap">
        <div class="tabs" id="tabs"></div>
        <button class="add-tile add-tab" id="btnAddArtifact" title="新增古玩">+</button>
      </div>

      <div class="canvas" id="canvas">
        <div class="canvas-inner" id="canvasInner"></div>
        <button class="canvas-upload" id="canvasUpload" title="上傳 3D 模型" aria-label="上傳 3D 模型"></button>
        <div class="canvas-footer hidden" id="canvasFooter"></div>
      </div>

      <div class="section">
        <div class="section-label-row"><div class="section-label">學生作品</div></div>
        <div class="thumbs" id="thumbs"></div>
      </div>

      <div class="section">
        <div class="section-label-row"><div class="section-label">古玩藏品介紹</div></div>
        <div class="description" id="description" data-placeholder="介紹 · 點擊鉛筆編輯"></div>
        <button class="edit-icon" id="editDesc" title="編輯介紹" aria-label="編輯介紹"></button>
      </div>

    </div>
  </div>
</div>

<input type="file" id="fileModel"   accept=".glb,.gltf,.obj" style="display:none">
<input type="file" id="filePreview" accept="image/*" style="display:none">

<script>
const img = (seed, w=400, h=400) => `https://picsum.photos/seed/${seed}/${w}/${h}`;

function initialData() {
  return {
    exhibitTitle: '張宗憲先生古玩藏品',
    artifacts: [
      { id: 'a1', title: '青花瓷',
        description: '明代典型青花器，以鈷料繪製纏枝花卉紋，釉色深沉明亮，為宮廷御用之器。',
        preview: img('art-jh', 400, 400), model: 'original-jh.glb',
        creations: [
          { id: 'c1', name: '李小明', school: '聖保羅書院',       displayMode: 'individual', preview: img('stu-lxm', 400, 300), model: 'lxm.glb' },
          { id: 'c2', name: '王美琳', school: '嘉諾撒聖瑪利書院', displayMode: 'individual', preview: img('stu-wml', 400, 300), model: 'wml.glb' },
          { id: 'c3', name: '張偉',   school: '培正中學',         displayMode: 'school',     preview: img('stu-zw',  400, 300), model: 'zw.glb' },
        ] },
      { id: 'a2', title: '唐三彩',
        description: '以鉛釉低溫燒成，釉色黃、綠、白三色流淌交融，為盛唐陶俑典範。',
        preview: img('art-tang', 400, 400), model: 'original-tang.glb',
        creations: [
          { id: 'c5', name: '陳雅文', school: '拔萃女書院',   displayMode: 'individual', preview: img('stu-cyw', 400, 300), model: 'cyw.glb' },
          { id: 'c6', name: '林子豪', school: '英皇書院',     displayMode: 'school',     preview: img('stu-lzh', 400, 300), model: 'lzh.glb' },
        ] },
      { id: 'a3', title: '青銅器',
        description: '饕餮紋青銅鼎，器腹分為三段，紋飾對稱穩定，為周代禮器典範。',
        preview: img('art-br', 400, 400), model: 'original-br.glb',
        creations: [
          { id: 'c8', name: '何思遠', school: '香港華仁書院', displayMode: 'individual', preview: img('stu-hsy', 400, 300), model: 'hsy.glb' },
        ] },
    ]
  };
}

const uid = (prefix) => prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
let data = initialData();
const state = { artifactId: data.artifacts[0]?.id ?? null, creationId: null, dirty: false };
const curArt = () => data.artifacts.find(a => a.id === state.artifactId) ?? null;
const curCre = () => state.creationId === null ? null : (curArt()?.creations.find(c => c.id === state.creationId) ?? null);
const isArtifactView = () => state.creationId === null;

const $ = (id) => document.getElementById(id);
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style') e.style.cssText = props[k];
    else if (k === 'draggable') e.draggable = props[k];
    else if (k.startsWith('data-') || k.startsWith('aria-') || k === 'title' || k === 'src' || k === 'alt') e.setAttribute(k, props[k]);
    else e[k] = props[k];
  }
  for (const c of children) { if (c == null) continue; e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); }
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

const SVG_NS = 'http://www.w3.org/2000/svg';
function svgNode(attrs, children) { const n = document.createElementNS(SVG_NS, 'svg'); for (const k in attrs) n.setAttribute(k, String(attrs[k])); children.forEach(c => n.appendChild(c)); return n; }
function svgPath(d) { const p = document.createElementNS(SVG_NS, 'path'); p.setAttribute('d', d); return p; }
const SVG_COMMON = { fill: 'none', stroke: 'currentColor', 'stroke-width': 1.8, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' };
function pencilSvg(size = 14) {
  return svgNode({ width: size, height: size, viewBox: '0 0 24 24', ...SVG_COMMON },
    [svgPath('M12 20h9'), svgPath('M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z')]);
}

const dom = {
  exhibitTitle: $('exhibitTitle'), editExhibitTitle: $('editExhibitTitle'),
  tabs: $('tabs'), thumbs: $('thumbs'),
  canvas: $('canvas'), canvasInner: $('canvasInner'), canvasUpload: $('canvasUpload'), canvasFooter: $('canvasFooter'),
  description: $('description'), editDesc: $('editDesc'),
  dirtyBadge: $('dirtyBadge'),
  fileModel: $('fileModel'), filePreview: $('filePreview'),
  tabButtons: [], thumbButtons: [],
};
[dom.editExhibitTitle, dom.editDesc].forEach(b => b.appendChild(pencilSvg(14)));
dom.canvasUpload.appendChild(pencilSvg(16));

function markDirty() {
  if (state.dirty) return;
  state.dirty = true;
  dom.dirtyBadge.classList.add('is-dirty');
  dom.dirtyBadge.querySelector('.text').textContent = 'dirty · unsaved (session only)';
}
function markClean() {
  state.dirty = false;
  dom.dirtyBadge.classList.remove('is-dirty');
  dom.dirtyBadge.querySelector('.text').textContent = 'clean · no unsaved changes';
}

function makeEditable(textEl, triggerEl, getValue, setValue, multiline = false, onCommit = null) {
  textEl.contentEditable = 'false';
  triggerEl.addEventListener('click', (e) => {
    e.stopPropagation();
    textEl.textContent = getValue() || '';
    textEl.contentEditable = 'true';
    textEl.focus();
    const range = document.createRange();
    range.selectNodeContents(textEl);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
  });
  textEl.addEventListener('blur', () => {
    if (textEl.contentEditable !== 'true') return;
    textEl.contentEditable = 'false';
    const v = textEl.textContent.trim();
    if (v !== (getValue() || '')) { setValue(v); markDirty(); if (onCommit) onCommit(); }
    textEl.textContent = getValue() || '';
  });
  textEl.addEventListener('keydown', (e) => {
    if (textEl.contentEditable !== 'true') return;
    if (e.key === 'Enter' && !multiline) { e.preventDefault(); textEl.blur(); }
    else if (e.key === 'Escape') { textEl.blur(); }
  });
}

/* Builders */
function renderExhibitTitle() { dom.exhibitTitle.textContent = data.exhibitTitle || ''; }

function buildTabs() {
  clear(dom.tabs);
  data.artifacts.forEach(a => {
    const titleEl = el('span', { class: 'tab-title', 'data-placeholder': '古玩名稱' });
    titleEl.textContent = a.title || '';
    const editBtn = el('button', { class: 'edit-icon', title: '編輯古玩名稱', 'aria-label': '編輯' });
    editBtn.appendChild(pencilSvg());
    makeEditable(titleEl, editBtn, () => a.title, (v) => { a.title = v; });
    const removeBtn = el('button', { class: 'remove-btn', title: '刪除古玩', 'aria-label': '刪除' }, ['×']);
    removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeArtifact(a.id); });
    const tab = el('div', { class: 'tab' + (a.id === state.artifactId ? ' active' : ''), 'data-aid': a.id, draggable: true }, [titleEl, editBtn, removeBtn]);
    tab.addEventListener('click', (e) => {
      if (e.target.closest('[contenteditable="true"]') || e.target.closest('.edit-icon') || e.target.closest('.remove-btn')) return;
      selectArtifact(a.id);
    });
    attachDrag(tab, 'artifact');
    dom.tabs.appendChild(tab);
  });
  dom.tabButtons = [...dom.tabs.querySelectorAll('.tab')];
}
function setActiveTab() { dom.tabButtons.forEach(b => b.classList.toggle('active', b.dataset.aid === state.artifactId)); }

function buildThumbs() {
  clear(dom.thumbs);
  const a = curArt();
  if (a) {
    a.creations.forEach(c => {
      let tile;
      if (c.preview) tile = el('div', { class: 'thumb-tile' }, [el('img', { src: c.preview, alt: c.name })]);
      else tile = el('div', { class: 'thumb-tile empty' }, ['+']);
      const name = el('span', { class: 'thumb-name' }, [c.name || '新學生']);
      const editBtn = el('button', { class: 'thumb-edit', title: '上傳預覽圖', 'aria-label': '上傳預覽圖' });
      editBtn.appendChild(pencilSvg(12));
      editBtn.addEventListener('click', (e) => { e.stopPropagation(); triggerPreviewUpload(c.id); });
      const removeBtn = el('button', { class: 'remove-btn', title: '刪除學生', 'aria-label': '刪除' }, ['×']);
      removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeCreation(c.id); });
      const thumb = el('div', { class: 'thumb' + (c.id === state.creationId ? ' active' : ''), 'data-cid': c.id, draggable: true }, [tile, name, editBtn, removeBtn]);
      thumb.addEventListener('click', (e) => {
        if (e.target.closest('.thumb-edit') || e.target.closest('.remove-btn')) return;
        selectCreation(c.id);
      });
      attachDrag(thumb, 'creation');
      dom.thumbs.appendChild(thumb);
    });
  }
  const addBtn = el('div', { class: 'add-tile add-thumb', title: '新增學生' }, ['+']);
  addBtn.addEventListener('click', addCreation);
  dom.thumbs.appendChild(addBtn);
  dom.thumbButtons = [...dom.thumbs.querySelectorAll('.thumb')];
}
function setActiveThumb() { dom.thumbButtons.forEach(b => b.classList.toggle('active', b.dataset.cid === state.creationId)); }

let _canvasTimer = null;
function updateCanvas(animate = true) {
  const a = curArt(); const c = curCre();
  const isArt = isArtifactView();
  const subject = isArt ? a : c;
  const swap = () => {
    clear(dom.canvasInner);
    const glyph = el('div', { class: 'canvas-3d' }, ['3D']);
    const caption = el('div', { class: 'canvas-caption' }, [isArt ? '原作 · ORIGINAL' : '學生作品 · STUDENT WORK']);
    const modelName = el('div', { class: 'canvas-model-filename' }, [(subject ? (subject.model || 'no model') : '—')]);
    dom.canvasInner.appendChild(glyph);
    dom.canvasInner.appendChild(caption);
    dom.canvasInner.appendChild(modelName);
  };
  if (!animate) { swap(); updateCanvasFooter(); return; }
  dom.canvasInner.classList.add('fading');
  clearTimeout(_canvasTimer);
  _canvasTimer = setTimeout(() => { swap(); requestAnimationFrame(() => dom.canvasInner.classList.remove('fading')); }, 180);
  updateCanvasFooter();
}

function updateCanvasFooter() {
  const c = curCre();
  clear(dom.canvasFooter);
  if (!c) { dom.canvasFooter.classList.add('hidden'); return; }
  dom.canvasFooter.classList.remove('hidden');
  const mode = c.displayMode || 'individual';
  const nameEl = el('span', { class: mode === 'individual' ? 'primary-text' : 'secondary-text', 'data-placeholder': '學生名' });
  nameEl.textContent = c.name || '';
  const editName = el('button', { class: 'edit-icon', title: '編輯學生名', 'aria-label': '編輯學生名' });
  editName.appendChild(pencilSvg(12));
  makeEditable(nameEl, editName, () => c.name, (v) => { c.name = v; buildThumbs(); });
  const nameRow = el('div', { class: 'canvas-footer-row' }, [nameEl, editName]);

  const schoolEl = el('span', { class: mode === 'individual' ? 'secondary-text' : 'primary-text', 'data-placeholder': '學校名' });
  schoolEl.textContent = c.school || '';
  const editSchool = el('button', { class: 'edit-icon', title: '編輯學校名', 'aria-label': '編輯學校名' });
  editSchool.appendChild(pencilSvg(12));
  makeEditable(schoolEl, editSchool, () => c.school, (v) => { c.school = v; });
  const schoolRow = el('div', { class: 'canvas-footer-row' }, [schoolEl, editSchool]);

  // Order depends on mode
  if (mode === 'individual') {
    dom.canvasFooter.appendChild(nameRow);
    dom.canvasFooter.appendChild(schoolRow);
  } else {
    dom.canvasFooter.appendChild(schoolRow);
    dom.canvasFooter.appendChild(nameRow);
  }

  // Mode toggle
  const toggle = el('div', { class: 'mode-toggle' });
  const optInd = el('span', { class: 'mode-opt' + (mode === 'individual' ? ' active' : ''), 'data-mode': 'individual' }, ['個人']);
  const sep = el('span', { class: 'mode-sep' }, ['/']);
  const optSch = el('span', { class: 'mode-opt' + (mode === 'school' ? ' active' : ''), 'data-mode': 'school' }, ['學校']);
  toggle.appendChild(optInd); toggle.appendChild(sep); toggle.appendChild(optSch);
  toggle.addEventListener('click', (e) => {
    const opt = e.target.closest('[data-mode]'); if (!opt) return;
    if (opt.dataset.mode === c.displayMode) return;
    c.displayMode = opt.dataset.mode;
    markDirty();
    updateCanvasFooter();
  });
  dom.canvasFooter.appendChild(toggle);
}

function updateDescription() { dom.description.textContent = curArt()?.description ?? ''; }

/* Static-element bindings */
makeEditable(dom.exhibitTitle, dom.editExhibitTitle,
  () => data.exhibitTitle ?? '',
  (v) => { data.exhibitTitle = v; }
);
makeEditable(dom.description, dom.editDesc,
  () => curArt()?.description ?? '',
  (v) => { const a = curArt(); if (a) a.description = v; },
  true
);

/* Selection */
function selectArtifact(id) {
  const sameArtifact = id === state.artifactId;
  state.artifactId = id;
  state.creationId = null;
  setActiveTab();
  if (!sameArtifact) { buildThumbs(); updateDescription(); }
  else { setActiveThumb(); }
  updateCanvas();
}
function selectCreation(id) {
  if (id === state.creationId) return;
  state.creationId = id;
  setActiveThumb(); updateCanvas();
}

/* Add / remove */
function addArtifact() {
  const newArt = { id: uid('a'), title: '新古玩', description: '', preview: '', model: '', creations: [] };
  data.artifacts.push(newArt);
  state.artifactId = newArt.id; state.creationId = null;
  buildTabs(); buildThumbs(); updateCanvas(); updateDescription();
  markDirty();
  setTimeout(() => dom.tabs.querySelector(`[data-aid="${newArt.id}"] .edit-icon`)?.click(), 50);
}
function removeArtifact(id) {
  if (!confirm('刪除此古玩及其所有學生創作？')) return;
  const idx = data.artifacts.findIndex(a => a.id === id);
  data.artifacts.splice(idx, 1);
  if (state.artifactId === id) {
    state.artifactId = data.artifacts[0]?.id ?? null;
    state.creationId = null;
  }
  buildTabs(); buildThumbs(); updateCanvas(); updateDescription();
  markDirty();
}
function addCreation() {
  const a = curArt(); if (!a) { alert('請先新增古玩。'); return; }
  const newCre = { id: uid('c'), name: '新學生', school: '', displayMode: 'individual', preview: '', model: '' };
  a.creations.push(newCre);
  state.creationId = newCre.id;
  buildThumbs(); updateCanvas();
  markDirty();
  // Auto-focus the name field in the canvas footer for immediate editing
  setTimeout(() => dom.canvasFooter.querySelector('.edit-icon')?.click(), 50);
}
function removeCreation(id) {
  if (!confirm('刪除此學生？')) return;
  const a = curArt(); if (!a) return;
  const idx = a.creations.findIndex(c => c.id === id);
  a.creations.splice(idx, 1);
  if (state.creationId === id) state.creationId = null;
  buildThumbs(); updateCanvas();
  markDirty();
}

function trigger3DUpload() {
  const a = curArt(); const c = curCre();
  const target = isArtifactView() ? a : c;
  if (!target) { alert('請先選擇一個古玩或學生。'); return; }
  dom.fileModel.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const name = file.name.toLowerCase();
    if (!(name.endsWith('.glb') || name.endsWith('.gltf') || name.endsWith('.obj'))) {
      alert('僅接受 .glb / .gltf / .obj 格式。'); return;
    }
    target.model = file.name;
    updateCanvas();
    markDirty();
    e.target.value = '';
  };
  dom.fileModel.click();
}
function triggerPreviewUpload(creationId) {
  const a = curArt();
  const c = a?.creations.find(x => x.id === creationId);
  if (!c) return;
  dom.filePreview.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!file.type.startsWith('image/')) { alert('請選擇圖片檔案。'); return; }
    c.preview = URL.createObjectURL(file);
    buildThumbs();
    markDirty();
    e.target.value = '';
  };
  dom.filePreview.click();
}

/* Drag-and-drop reorder */
let drag = null;
function attachDrag(node, kind) {
  node.addEventListener('dragstart', (e) => {
    if (e.target.closest('[contenteditable="true"]')) { e.preventDefault(); return; }
    drag = { kind, node };
    if (kind === 'artifact') drag.id = node.dataset.aid;
    else if (kind === 'creation') drag.id = node.dataset.cid;
    node.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', kind);
  });
  node.addEventListener('dragend', () => {
    node.classList.remove('dragging');
    document.querySelectorAll('.drop-target-before,.drop-target-after')
      .forEach(n => n.classList.remove('drop-target-before', 'drop-target-after'));
    drag = null;
  });
  node.addEventListener('dragover', (e) => {
    if (!drag || drag.kind !== kind || drag.node === node) return;
    e.preventDefault();
    const r = node.getBoundingClientRect();
    document.querySelectorAll('.drop-target-before,.drop-target-after')
      .forEach(n => n.classList.remove('drop-target-before', 'drop-target-after'));
    const midX = r.left + r.width / 2;
    node.classList.add(e.clientX < midX ? 'drop-target-before' : 'drop-target-after');
  });
  node.addEventListener('drop', (e) => {
    if (!drag || drag.kind !== kind || drag.node === node) return;
    e.preventDefault();
    const r = node.getBoundingClientRect();
    const insertBefore = e.clientX < r.left + r.width / 2;
    if (kind === 'artifact') reorderArtifact(drag.id, node.dataset.aid, insertBefore);
    else if (kind === 'creation') reorderCreation(drag.id, node.dataset.cid, insertBefore);
  });
}
function reorderArtifact(draggedId, targetId, insertBefore) {
  const from = data.artifacts.findIndex(a => a.id === draggedId);
  if (from < 0) return;
  const [item] = data.artifacts.splice(from, 1);
  let insertAt = data.artifacts.findIndex(a => a.id === targetId);
  if (insertAt < 0) insertAt = data.artifacts.length;
  if (!insertBefore) insertAt += 1;
  data.artifacts.splice(insertAt, 0, item);
  buildTabs();
  markDirty();
}
function reorderCreation(draggedId, targetId, insertBefore) {
  const a = curArt(); if (!a) return;
  const from = a.creations.findIndex(c => c.id === draggedId);
  if (from < 0) return;
  const [item] = a.creations.splice(from, 1);
  let insertAt = a.creations.findIndex(c => c.id === targetId);
  if (insertAt < 0) insertAt = a.creations.length;
  if (!insertBefore) insertAt += 1;
  a.creations.splice(insertAt, 0, item);
  buildThumbs();
  markDirty();
}

/* Admin actions */
$('btnSave').addEventListener('click', () => {
  console.group('%c[admin] SAVE → payload', 'color:#ededed;background:#262626;padding:2px 8px');
  console.log(JSON.parse(JSON.stringify(data)));
  console.groupEnd();
  markClean();
  alert('已記錄到 console。於 Phase B 會 POST 至後端。');
});
$('btnExport').addEventListener('click', async () => {
  const text = JSON.stringify(data, null, 2);
  try { await navigator.clipboard.writeText(text); alert('JSON 已複製至剪貼板。'); }
  catch { console.log(text); alert('剪貼板受限。JSON 已記錄到 console。'); }
});
$('btnReset').addEventListener('click', () => {
  if (!confirm('重置為初始範例資料？未儲存的變更會遺失。')) return;
  data = initialData();
  state.artifactId = data.artifacts[0]?.id ?? null;
  state.creationId = null;
  renderExhibitTitle();
  buildTabs(); buildThumbs(); updateCanvas(false); updateDescription();
  markClean();
});

$('btnAddArtifact').addEventListener('click', addArtifact);
dom.canvasUpload.addEventListener('click', trigger3DUpload);

window.addEventListener('beforeunload', (e) => {
  if (state.dirty) { e.preventDefault(); e.returnValue = ''; }
});

function fit() {
  const wrap = $('wrap');
  const available = window.innerHeight - 120;
  const scale = Math.min(1, available / 1920);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width  = (1080 * scale) + 'px';
  wrap.style.height = (1920 * scale) + 'px';
}
window.addEventListener('resize', fit);
fit();

renderExhibitTitle();
buildTabs(); buildThumbs();
updateCanvas(false); updateDescription();
</script>
</body>
</html>
